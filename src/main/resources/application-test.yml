spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finance_test_db}
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD:finance_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.financeapp: INFO

app:
  jwt:
    secret: test_secret_key_which_must_be_at_least_512_bits_long_for_hs512_to_work_correctly
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  security:
    fingerprint-validation: true
